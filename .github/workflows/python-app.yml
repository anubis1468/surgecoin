name: SurgeCoin CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CF_WORKER_NAME: surgecoin-backend
  CF_KV_NAMESPACE: SURGECOIN_DB

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Node 24
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Wrangler
      run: npm install -g wrangler

    - name: Ensure backend_cf structure
      run: mkdir -p backend_cf/src

    - name: Generate Cloudflare backend (cf_auto.py)
      run: python cf_auto.py

    - name: Configure Wrangler (non-interactive)
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        mkdir -p ~/.config/wrangler
        echo "api_token = \"$CLOUDFLARE_API_TOKEN\"" > ~/.config/wrangler/config.toml

    - name: Ensure KV namespace exists
      run: |
        wrangler kv namespace list | grep "$CF_KV_NAMESPACE" || wrangler kv namespace create "$CF_KV_NAMESPACE"

    - name: Deploy Worker
      run: wrangler deploy --config backend_cf/wrangler.toml

    - name: Deploy Cloudflare Pages (website)
      run: |
        if [ -d "website" ]; then
          wrangler pages deploy website --project-name=surgecoin-site
        else
          echo "No website/ directory, skipping Pages deploy."
        fi

    - name: Deploy Cloudflare Pages (bot)
      run: |
        if [ -d "bot_pages" ]; then
          wrangler pages deploy bot_pages --project-name=surgecoin-bot
        else
          echo "No bot_pages/ directory, skipping bot Pages deploy."
        fi

