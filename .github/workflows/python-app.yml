name: SurgeCoin CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  release:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CF_WORKER_NAME: surgecoin-backend
  CF_KV_NAMESPACE: SURGECOIN_DB

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Setup Node 24
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Install Wrangler
      run: npm install -g wrangler

    - name: Create backend_cf folder if missing
      run: mkdir -p backend_cf/src

    - name: Generate Cloudflare backend (cf_auto.py)
      run: python cf_auto.py

    - name: Authenticate Wrangler
      run: wrangler login --scopes "workers scripts kv namespaces pages"

    - name: Ensure KV namespace exists
      run: |
        wrangler kv namespace create $CF_KV_NAMESPACE || echo "KV exists"

    - name: Bind KV namespace to Worker
      run: |
        wrangler kv namespace list | grep $CF_KV_NAMESPACE || wrangler kv namespace create $CF_KV_NAMESPACE

    - name: Deploy Cloudflare Worker
      run: wrangler deploy --config backend_cf/wrangler.toml

    - name: Deploy Cloudflare Pages (website/admin)
      run: |
        wrangler pages deploy website --project-name=surgecoin-site

    - name: Deploy Bot (Cloudflare Pages Worker Mode)
      run: |
        wrangler pages deploy bot --project-name=surgecoin-bot

    - name: Auto Versioning
      id: version
      run: |
        VERSION="v$(date +'%Y.%m.%d.%H%M')"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Generate Changelog
      run: |
        echo "## Changelog for ${{ steps.version.outputs.version }}" > CHANGELOG.md
        git log -1 --pretty=format:"- %s" >> CHANGELOG.md

    - name: Commit & Push Changelog
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add CHANGELOG.md
        git commit -m "Update changelog for ${{ steps.version.outputs.version }}" || echo "No changes"
        git push || echo "No push needed"

